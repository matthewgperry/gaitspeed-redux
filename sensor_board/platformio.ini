; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = sensor_board

[env:sensor_board]
platform = ststm32
board = genericSTM32C092FBP
framework = arduino
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200

build_flags =
    -D NODE_ID=0x10
    -D SENSOR_DISTANCE_MM=4000
    -D TRIP_THRESHOLD_MM=1500
    -D MAX_VALID_TRANSIT_US=30000000
    -D HAL_FDCAN_MODULE_ENABLED

lib_deps =
    stm32duino/STM32duino FreeRTOS@^10.3.3
    stm32duino/STM32duino VL53L4CX@^1.1.0
    adafruit/Adafruit NeoPixel

